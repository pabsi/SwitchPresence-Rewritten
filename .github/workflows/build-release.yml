name: Build and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Manager/**'
      - 'Server/**'
      - 'Makefile'
      - 'VERSION'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: docker run --rm -v "$GITHUB_WORKSPACE:/project" -w /project devkitpro/devkita64:20230419 make

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            out/SwitchPresence-Rewritten-Manager.nro \
            out/Sysmodule.zip \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
